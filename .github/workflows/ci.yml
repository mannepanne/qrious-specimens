name: CI

# Pull-request gate. Runs the same test/typecheck/build steps as the deploy
# workflow, minus the actual deploy. Required by main's branch protection so
# a broken test can no longer land on main and red-flag the deploy run.

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Test, typecheck, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

      - name: Build
        # `bun run build` runs `tsc -b && vite build` so type errors fail here.
        run: bun run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
