# ABOUT: Cloudflare Workers configuration
# ABOUT: Serves the Vite SPA as static assets; Worker handles API routes and SPA routing fallback

name = "qrious-specimens"
compatibility_date = "2025-01-01"
main = "src/worker.ts"

[assets]
directory = "./dist"
binding = "ASSETS"
html_handling = "auto-trailing-slash"
not_found_handling = "single-page-application"

[observability]
enabled = true

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "qrious-specimens-images"

[vars]
# Legacy R2 URL — used only for images uploaded before CF Images migration
# Find in: Cloudflare dashboard → R2 → qrious-specimens-images → Settings
PUBLIC_R2_URL = "https://pub-PLACEHOLDER.r2.dev"

# Cloudflare Images delivery hash — NOT a secret (appears in every image URL)
# Find in: Cloudflare dashboard → Images → Overview → "Your images are served from"
# e.g. https://imagedelivery.net/XXXXXX/<image_id>/<variant>  ← XXXXXX is the hash
CF_IMAGES_DELIVERY_HASH = "PLACEHOLDER"

# Secrets — set via `wrangler secret put <NAME>` (never in this file):
#   GEMINI_API_KEY
#   ANTHROPIC_API_KEY
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
#   SUPABASE_JWT_SECRET
#   RESEND_API_KEY            (contact form admin notification emails)
#   CF_ACCOUNT_ID             (Cloudflare account ID — right sidebar on any CF dashboard page)
#   CF_IMAGES_TOKEN           (CF API token with Images:Edit permission)

# Rate limiting — /api/contact: max 5 requests per IP per 60 seconds
# namespace_id is an arbitrary unique integer that scopes this limiter
# In local dev (wrangler dev), this binding is simulated and always succeeds
[[unsafe.bindings]]
name = "CONTACT_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 5, period = 60 }
